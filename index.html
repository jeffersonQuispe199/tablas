<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Multiplicación v3.0</title>
    <link rel="stylesheet" href="multiplicar.css">

       <script src="multiplicar.js"></script>
</head>
<body class="tech-theme">
    <div class="bg-grid"></div>
    <div class="bg-scanline"></div>

    <header class="header">
        <div class="input-group">
        <label for="numeroTabla">TABLA DE MULTIPLICACION:</label>
        <input type="number" id="numeroTabla" placeholder="0" min="1" max="99">
    </div>
        <button onclick="generarTablas()" class="btn-probar">ESTUDIAR TABLA</button>

    </header>

    <main class="container">
        <h1 class="glitch-text" data-text="TABLA DEL 3">TABLAs DE MULTIPLICAR </h1>
        
        <div class="table-container" id="tablas">
            <div class="row"><span>01 > 3 x 1</span> <span>03</span></div>
            <div class="row"><span>02 > 3 x 2</span> <span>06</span></div>
            <div class="row"><span>03 > 3 x 3</span> <span>09</span></div>
            <div class="row"><span>04 > 3 x 4</span> <span>12</span></div>
            <div class="row"><span>05 > 3 x 5</span> <span>15</span></div>
            <div class="row"><span>06 > 3 x 6</span> <span>18</span></div>
            <div class="row"><span>07 > 3 x 7</span> <span>21</span></div>
            <div class="row"><span>08 > 3 x 8</span> <span>24</span></div>
            <div class="row"><span>09 > 3 x 9</span> <span>27</span></div>
            <div class="row"><span>10 > 3 x 10</span> <span>30</span></div>
        </div>
    </main>

    <footer class="footer">
        <p>[SISTEMA OPERATIVO 0.1]: Creado por: ++EL JEFF++ - Acceso Concedido</p>
    </footer>
</body>
</html>
